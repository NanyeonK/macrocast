site_name: macrocast
site_description: Single-path forecasting package with recipe-first runs and tree-path architecture.
site_author: yeonchan
docs_dir: docs
repo_url: https://github.com/NanyeonK/macrocast
repo_name: NanyeonK/macrocast
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Install & Quickstart: getting-started.md
  - User Guide:
    - Overview: user-guide/index.md
    - Stage Map: user-guide/single-run/stages/index.md
    - Stage 0:
      - Overview: user-guide/single-run/stages/stage-0/index.md
      - 0.1 experiment_unit: user-guide/single-run/stages/stage-0/01-experiment-unit.md
      - Choice Stack: user-guide/single-run/stages/stage-0/choice-stack.md
    - Stage 1:
      - Overview: user-guide/single-run/stages/stage-1/index.md
    - Stage 2:
      - Overview: user-guide/single-run/stages/stage-2/index.md
    - Stage 3:
      - Overview: user-guide/single-run/stages/stage-3/index.md
    - Stage 4:
      - Overview: user-guide/single-run/stages/stage-4/index.md
    - Stage 5:
      - Overview: user-guide/single-run/stages/stage-5/index.md
    - Stage 6:
      - Overview: user-guide/single-run/stages/stage-6/index.md
    - Stage 7:
      - Overview: user-guide/single-run/stages/stage-7/index.md
  - Examples:
    - Overview: replication/index.md
    - CLSS 2021:
      - Overview: tutorials/clss2021-replication.md
  - API Reference:
    - Overview: api/index.md
    - macrocast.data: api/data.md
    - macrocast.preprocessing: api/preprocessing.md
    - macrocast.pipeline: api/pipeline.md
    - macrocast.evaluation: api/evaluation.md
    - macrocast.interpretation: api/interpretation.md
    - macrocast.viz: api/viz.md
    - macrocast.utils: api/utils.md
