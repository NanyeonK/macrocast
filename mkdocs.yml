site_name: macrocast
site_description: Decomposing ML Forecast Gains in Macroeconomic Forecasting
site_author: yeonchan
docs_dir: docs
repo_url: https://github.com/NanyeonK/macrocast
repo_name: NanyeonK/macrocast
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tree-Path Architecture:
    - Design: DESIGN.md
    - Tree-Path Overhaul: planning/treepath-package-overhaul.md
    - Migration Map: planning/treepath-migration-map.md
    - Registries Layer: planning/treepath-registries-layer.md
    - Recipes Layer: planning/treepath-recipes-layer.md
    - Compile Integration: planning/treepath-compile-integration.md
    - Benchmark Redesign: planning/treepath-benchmark-redesign.md
    - Runs Layer: planning/treepath-runs-layer.md
    - CLSS Migration: planning/treepath-clss-migration.md
  - Replication and Recipes:
    - Overview: replication/index.md
    - CLSS 2021 Tutorial (migration note): tutorials/clss2021-replication.md
  - API Reference:
    - macrocast.data: api/data.md
    - macrocast.preprocessing: api/preprocessing.md
    - macrocast.pipeline: api/pipeline.md
    - macrocast.evaluation: api/evaluation.md
    - macrocast.interpretation: api/interpretation.md
    - macrocast.viz: api/viz.md
    - macrocast.utils: api/utils.md
  - Roadmap: roadmap.md
